# For full annotated example, please visit
#   https://onebranch.visualstudio.com/Pipeline/_wiki/wikis/Pipeline.wiki?wikiVersion=GBwikiMaster&pagePath=%2FWelcome%20to%20OneBranch%20Pipeline%2FCross%20Platform%20Cloud%20Delivery%20Pipeline%20(CDPx)%2FYAML%20Format%2FAnnotated%20Example

# The following section is a metadata section that describes what kind of environment this pipeline should be executing in. Some of the
# information is redundant and will be removed in a future version.
environment:
  host:
    os: 'windows'                                                       # used to verify at runtime that correct host pool is being used
    flavor: 'server'                                                    # not used and will be removed in future
    version: '2016'                                                     # not used and will be removed in future
  runtime:
    provider: 'appcontainer'                                            # Currently only appcontainer is supported
                                                                        # future will bring oscontainer and virtualmachine
    image: 'cdpxwin.azurecr.io/legacy/global/vse2017u7-external-azsdk-mobile-ext-winltsc2016:latest' # This is the image that your pipeline will run in.
                                                                        # For (appcontainer), Docker Hub public Microsoft repository images
                                                                        # can be used.
                                                                        # Example microsoft/dotnet:1.1.1-sdk-nanoserver.
                                                                        # Or the CDP team vended and custom images can be used.
                                                                        # These are cdpxwin.azurecr.io/user/<user-image-name> or
                                                                        # cdpxwin.azurecr.io/legacy/samples/wsmobile (for now).
    source_mode: 'link'                                                 # 'copy' or 'link'. There is a known bug for npm and ruby on some of
                                                                        # our images that linked folder in container may cause errors on
                                                                        # these languages, for that case, use 'copy' here and pipeline will
                                                                        # full copy source into container from host before each step and full
                                                                        # copy out back to host after each step. It may be very slow if you
                                                                        # have a giant repository.

signing_options:
  profile: 'external_distribution'   # Signing profile for libraries or applications being shipped outside of Microsoft.

package_sources:
  nuget:
    feeds:
      Nuget: https://api.nuget.org/v3/index.json
    config_files:                               # A list of glob patterns specifying the configuration files. Use this if you already have NuGet.Config files in your repository.
          - include:                            # Configuration files to include for automatic inference.
            - "NuGet.Config"

# The following is an optional user defined stage. This is the only stage that will have network connectivity
# starting July 1, 2018. This stage should be utilized for restoring package dependencies.
restore:                                         # Stage for restoring dependencies.
  commands:                                       # Sequence of commands to execute in this stage.
    - !!defaultcommand                            # Any of the documented commands may be used, but !!defaultcommand is the most useful.
      name: 'Restore Java Packages'               # A user defined name for this step.
      command: 'language-extensions\java\build\windows\restore-packages.cmd' # The repository relative path to the script to run to restore packages.
    - !!defaultcommand                            # Any of the documented commands may be used, but !!defaultcommand is the most useful.
      name: 'Restore R Packages'                  # A user defined name for this step.
      command: 'language-extensions\R\build\windows\restore-packages.cmd' # The repository relative path to the script to run to restore packages.
    - !!defaultcommand                            # Any of the documented commands may be used, but !!defaultcommand is the most useful.
      name: 'Restore Python Packages'                  # A user defined name for this step.
      command: 'language-extensions\python\build\windows\restore-packages.cmd' # The repository relative path to the script to run to restore packages.
    - !!defaultcommand                            # Any of the documented commands may be used, but !!defaultcommand is the most useful.
      name: 'Restore and Build GoogleTest'        # This script needs internet access hence in the restore stage.
      command: 'test\googletest\build\windows\build-googletest.cmd' # The repository relative path to the script to run to restore packages.

# The following is a metadata section that describes the versioning scheme and basic version datacenter to use. This data will be used to
# generate content in the .version folder for use by your custom versioning steps.
# In fact, in this sample, a file named .version\PipelineAssemblyInfo.cs will be generated that contains the following code (ignore the
# actual versions because those are dummy values).
#
# // This is a CDPX pipeline generated file
# using System.Reflection;
# [assembly: AssemblyVersion("1.0.060517.1000")]
# [assembly: AssemblyFileVersion("1.0.060517.1000")]
# [assembly: AssemblyInformationalVersion("1.0.060517.1000-test-31f791f1")]
#
# The key point is that this file is not checked in by CDPX. So, we check in a dummy file with similar content and add this file as a compile
# item with a link. When the code is built in CDPX, the file is first overwritten with actual version numbers. Thus, when the code compiles,
# the new version numbers are picked up.
#
# Obviously, this may not work for everyone. So, in addition to these template files, CDPX writes out several info files whose content is some
# part of the version number. Which part is hinted at by the name of the file.
# For example, package.semantic.info will contain patch semantic version number in the form 1.0.MMddyyrrrr-tag-commit.
version:
  name: 'mssql-language-extensions'                                     # The uber name to attach to the artifacts generated by this pipeline.
                                                                        # Currently unused, but will be used in the future to refer to the
                                                                        # artifacts as a group by name.
  major: 1                                                              # The major version number.
  minor: 0                                                              # The minor version number
  tag: 'alpha'                                                          # Tag to use for semantic versioning.
  system: 'patch'                                                       # Versioning scheme to use.
                                                                        # patch         - 1.0.MMddyyrrrr will be generated
                                                                        # buildrevision - 1.0.MMddyy.rrrr will be generated.

# An optional user defined stage for performing any compilation, code generation etc.
# All files in the artifacts sections will be collected, saved off and signed.
# The signed files will be restored back to the original locations before the next stage is invoked.
# Eventually, network access will be limited or cut-off in this stage.
build:
  commands:                                                             # This is a sequence of script files to be executed one after another
    - !!buildcommand
      name: 'Build Java extension'
      command: 'language-extensions\java\build\windows\build-java-extension.cmd'
      arguments:  'debug release'
      artifacts:
        - from: '.build\java-extension\target\debug'
          to: 'out\java-extension\debug'
          include:
            - 'mssql-java-lang-extension.jar'
          signing_options:
            profile: '170'
        - from: 'language-extensions\java\build\windows\x64\debug'
          to: 'out\java-extension\debug'
          include:
            - 'javaextension.dll'
          signing_options:
            profile: '135020002'
        - from: 'language-extensions\java\build\windows\x64\debug'
          to: 'out\java-extension\debug\symbols'
          include:
            - 'javaextension.pdb'
          signing_options:
            profile: 'none'
        - from: '.build\java-extension\target\release'
          to: 'out\java-extension\release'
          include:
            - 'mssql-java-lang-extension.jar'
          signing_options:
            profile: '170'
        - from: 'language-extensions\java\build\windows\x64\release'
          to: 'out\java-extension\release'
          include:
            - 'javaextension.dll'
          signing_options:
            profile: '135020002'
        - from: 'language-extensions\java\build\windows\x64\release'
          to: 'out\java-extension\release\symbols'
          include:
            - 'javaextension.pdb'
          signing_options:
            profile: 'none'
        - from: '.'
          to: 'out\java-extension'
          include:
            - 'data-sql-java-extension.nuspec'
          signing_options:
            profile: 'none'
    - !!buildcommand
      name: 'Build RExtension'
      command: 'language-extensions\R\build\windows\build-RExtension.cmd'
      arguments:  'debug release'
      artifacts:
        - from: '.build\RExtension\windows\debug'
          to: 'out\RExtension\debug'
          include:
            - 'libRExtension.dll'
        - from: '.build\RExtension\windows\release'
          to: 'out\RExtension\release'
          include:
            - 'libRExtension.dll'
          signing_options:
            profile: 'none'
    - !!buildcommand
      name: 'Build python extension'
      command: 'language-extensions\python\build\windows\build-python-extension.cmd'
      arguments:  'debug release'
      artifacts:
        - from: '.build\python-extension\windows\debug'
          to: 'out\python-extension\debug'
          include:
            - 'pythonextension.dll'
          signing_options:
            profile: '135020002'
        - from: '.build\python-extension\windows\debug'
          to: 'out\python-extension\debug\symbols'
          include:
            - 'pythonextension.pdb'
          signing_options:
            profile: 'none'
        - from: '.build\python-extension\windows\release'
          to: 'out\python-extension\release'
          include:
            - 'pythonextension.dll'
          signing_options:
            profile: '135020002'
        - from: '.build\python-extension\windows\release'
          to: 'out\python-extension\release\symbols'
          include:
            - 'pythonextension.pdb'
          signing_options:
            profile: 'none'
    - !!defaultcommand
      name: 'Build Sample Test'
      command: 'test\googletest\sample-test\build\windows\build-sample-test.cmd'
      arguments:  'debug release'
    - !!defaultcommand
      name: 'Build RExtension Test'
      command: 'language-extensions\R\test\build\windows\build-RExtension-test.cmd'
      arguments:  'debug release'
    - !!defaultcommand
      name: 'Build pythonextension Test'
      command: 'language-extensions\python\test\build\windows\build-pythonextension-test.cmd'
      arguments:  'debug release'

package:
  commands:                                      # This is a sequence of script files to be executed one after another
    - !!buildcommand
      name: 'Create Java extension zip'
      command: 'language-extensions\java\build\windows\create-java-extension-zip.cmd'
      artifacts:
        - from: '.build\java-extension\windows\debug\packages'
          to: 'out\java-extension\packages\debug'
          include:
            - 'java-lang-extension.zip'
        - from: '.build\java-extension\windows\release\packages'
          to: 'out\java-extension\packages\release'
          include:
            - 'java-lang-extension.zip'
    - !!buildcommand
      name: 'Create RExtension zip'
      command: 'language-extensions\R\build\windows\create-RExtension-zip.cmd'
      artifacts:
        - from: '.build\RExtension\windows\debug\packages'
          to: 'out\RExtension\packages\debug'
          include:
            - 'R-lang-extension.zip'
        - from: '.build\RExtension\windows\release\packages'
          to: 'out\RExtension\packages\release'
          include:
            - 'R-lang-extension.zip'
    - !!buildcommand
      name: 'Create python extension zip'
      command: 'language-extensions\python\build\windows\create-python-extension-zip.cmd'
      artifacts:
        - from: '.build\python-extension\windows\debug\packages'
          to: 'out\python-extension\packages\debug'
          include:
            - 'python-lang-extension.zip'
        - from: '.build\python-extension\windows\release\packages'
          to: 'out\python-extension\packages\release'
          include:
            - 'python-lang-extension.zip'

# An optional user defined stage for running tests that need network access. Note that unit tests and others that do not
# need network access can be run in build or package stages itself. Any artifacts built in this stage will be separated
# out and will not be signed. However, we recommend that tests always be run in the test stage.
# Eventually, we may even skip test artifacts completely.

test:
  commands: # This is a sequence of script files to be executed one after another in the order they appear here.
    - !!testcommand                              # We are going to run tests and collect back the test results for publishing
      name: 'Test The Code'                      # If your test run does not have a name, this will be used.
      command: 'test\run-unittests.cmd'          # Script that runs tests.
      arguments:  'debug release'
      fail_on_stderr: true                       # Force pipeline to fail if the task writes to standard error stream; default is true.
      skip_on_developer_box: true                # If running locally on a developer host instead of the pipeline managed hosts, skip this task. Default is false.
      testresults:                               # Sequence of entries indicating which test results files to collect.
        - title: 'All Tests'                     # Test run title. Used by VSTS.
          type: 'JUnit'                          # Test engine type. Used by VSTS. Supported values are JUnit, NUnit, VSTest and xUnit.
          include:                               # Sequence of glob patterns indicating which test results file to associate with this test run.
            - 'out\TestReport*.xml'
    - !!testcommand
      name: 'Test RExtension'               # If your test run does not have a name, this will be used.
      command: 'language-extensions\R\test\build\windows\run-RExtension-test.cmd'  # Script that runs tests.
      arguments:  'debug release'
      fail_on_stderr: false                      # Force pipeline to fail if the task writes to standard error stream; default is true.
      skip_on_developer_box: true                # If running locally on a developer host instead of the pipeline managed hosts, skip this task. Default is false.
      testresults:                               # Sequence of entries indicating which test results files to collect.
        - title: 'All Tests'                     # Test run title. Used by VSTS.
          type: 'JUnit'                          # Test engine type. Used by VSTS. Supported values are JUnit, NUnit, VSTest and xUnit.
          include:                               # Sequence of glob patterns indicating which test results file to associate with this test run.
            - 'out\TestReport*.xml'
    - !!testcommand                              # We are going to run tests and collect back the test results for publishing
      name: 'Test Python'                        # If your test run does not have a name, this will be used.
      command: 'language-extensions\python\test\build\windows\run-pythonextension-tests.cmd'        # Script that runs tests.
      arguments:  'debug'
      fail_on_stderr: false                      # Force pipeline to fail if the task writes to standard error stream; set to false because we have negative tests
      skip_on_developer_box: true                # If running locally on a developer host instead of the pipeline managed hosts, skip this task. Default is false.
      testresults:                               # Sequence of entries indicating which test results files to collect.
        - title: 'Python Tests'                     # Test run title. Used by VSTS.
          type: 'JUnit'                          # Test engine type. Used by VSTS. Supported values are JUnit, NUnit, VSTest and xUnit.
          include:                               # Sequence of glob patterns indicating which test results file to associate with this test run.
            - 'out\TestReport_pythonextension*.xml'
    - !!testcommand                              # We are going to run tests and collect back the test results for publishing
      name: 'Test Python'                        # If your test run does not have a name, this will be used.
      command: 'language-extensions\python\test\build\windows\run-pythonextension-tests.cmd'        # Script that runs tests.
      arguments:  'release'
      fail_on_stderr: false                      # Force pipeline to fail if the task writes to standard error stream; set to false because we have negative tests
      skip_on_developer_box: true                # If running locally on a developer host instead of the pipeline managed hosts, skip this task. Default is false.
      testresults:                               # Sequence of entries indicating which test results files to collect.
        - title: 'Python Tests'                     # Test run title. Used by VSTS.
          type: 'JUnit'                          # Test engine type. Used by VSTS. Supported values are JUnit, NUnit, VSTest and xUnit.
          include:                               # Sequence of glob patterns indicating which test results file to associate with this test run.
            - 'out\TestReport_pythonextension*.xml'

# There are no dlls to perform static analysis yet
static_analysis_options:
  fxcop_options:
    files_to_scan:
      - from: 'out\java-extension\release\'
      - from: 'out\java-extension\debug\'
      - from: 'out\RExtension\debug\'
      - from: 'out\RExtension\release\'
      - from: 'out\python-extension\debug\'
      - from: 'out\python-extension\release\'
  policheck_options:                                # OPTIONAL: If you want to add options for PoliCheck.
    files_to_scan:
        - exclude:
          - '**/*.txt'
  moderncop_options:
    disable_tool_scan: true
  binskim_options:
    files_to_scan:
      - from: 'out\java-extension\release\'
      - from: 'out\java-extension\debug\'
      - from: 'out\RExtension\debug\'
      - from: 'out\RExtension\release\'
      - from: 'out\python-extension\debug\'
      - from: 'out\python-extension\release\'
