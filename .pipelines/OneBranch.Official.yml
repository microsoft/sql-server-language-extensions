#################################################################################
#   Onebranch Pipelines - Official MSBuild (CDPXMigrated)                       #
# This pipeline was created by EasyStart from a sample located at:              #
#   https://aka.ms/obpipelines/easystart/samples                                #
# Documentation:  https://aka.ms/obpipelines                                    #
# Yaml Schema:    https://aka.ms/obpipelines/yaml/schema                        #
# Retail Tasks:   https://aka.ms/obpipelines/tasks                              #
# Support:        https://aka.ms/onebranchsup                                   #
#################################################################################

trigger: none # https://aka.ms/obpipelines/triggers

parameters: # parameters are shown up in ADO UI in a build queue time
- name: 'debug'
  displayName: 'Enable debug output'
  type: boolean
  default: false

variables:
  CDP_DEFINITION_BUILD_COUNT: $[counter('', 0)] # needed for onebranch.pipeline.version task https://aka.ms/obpipelines/versioning
  system.debug: ${{ parameters.debug }}
  ENABLE_PRS_DELAYSIGN: 1
  ROOT: $(Build.SourcesDirectory)
  REPOROOT: $(Build.SourcesDirectory)
  OUTPUTROOT: $(REPOROOT)\out
  EnlRoot: $(Build.SourcesDirectory)
  CDP_USER_SOURCE_FOLDER_CONTAINER_PATH: $(Build.SourcesDirectory)
  CDP_DEFINITION_BUILD_COUNT_DAY: $[counter(format('{0:yyyyMMdd}', pipeline.startTime), 1)]
  CDP_DEFINITION_BUILD_COUNT_MONTH: $[counter(format('{0:yyyyMM}', pipeline.startTime), 1)]
  CDP_DEFINITION_BUILD_COUNT_YEAR: $[counter(format('{0:yyyy}', pipeline.startTime), 1)]
  NUGET_XMLDOC_MODE: none

  WindowsContainerImage: 'onebranch.azurecr.io/windows/ltsc2019/vse2019:latest'

resources:
  repositories: 
    - repository: templates
      type: git
      name: OneBranch.Pipelines/GovernedTemplates
      ref: refs/heads/main

extends:
  template: v2/OneBranch.Official.CrossPlat.yml@templates # https://aka.ms/obpipelines/templates
  parameters:
    git:
      fetchDepth: 1
      longpaths: true  
    cloudvault: # https://aka.ms/obpipelines/cloudvault
      enabled: true
    globalSdl: # https://aka.ms/obpipelines/sdl
      tsa:
        enabled: true # OneBranch publishes all sdl results to TSA.
      # credscan:
      #   suppressionsFile: $(Build.SourcesDirectory)\.config\CredScanSuppressions.json
      binskim:
        enabled: true
        scanOutputDirectoryOnly: true
        break: false # always break the build on binskim issues in addition to TSA upload
        # analyzeTargetGlob: '+:f|out\outputs\**\*.dll;-:f|out\outputs\**\JavaExtension.dll;-:f|out\outputs\**\PythonExtension.dll;-:f|out\outputs\**\libRExtension.dll;-f:|out\outputs\**\nativecsharpextension.dll'
      policheck:
        enabled: true
        break: true # always break the build on policheck issues. You can disable it by setting to 'false'
      baseline:
        baselineFile: $(Build.SourcesDirectory)\.gdn\.gdnbaselines

    stages:
    - stage: Phase_1
      jobs:
      - job: build
        pool:
          type: windows  # read more about custom job pool types at https://aka.ms/obpipelines/yaml/jobs
        
        variables:
          ob_outputDirectory: '$(REPOROOT)\out' # this directory is uploaded to pipeline artifacts, reddog and cloudvault. More info at https://aka.ms/obpipelines/artifacts
          ob_sdl_binskim_break: true # https://aka.ms/obpipelines/sdl
          ob_sdl_binskim_scanOutputDirectoryOnly: true
          ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/master') }}: # conditionally enable symbolsPublishing for master branch only
            ob_symbolsPublishing_enabled: true # https://aka.ms/obpipelines/symbols
          ob_sdl_baseline_baselineFile: $(Build.SourcesDirectory)\.gdn\.gdnbaselines
          ob_sdl_codeSignValidation_excludes: -|**\pythonextension\**\PythonExtension.dll;-|**\java-extension\**\JavaExtension.dll;-|**\CompilerIdCXX\CompilerIdCXX.exe;-|**\CompilerIdCXX\a.exe
          ob_artifactBaseName: 'drop_Phase_1'
          # enable_network: true

        steps:
          - task: onebranch.pipeline.version@1 # generates automatic version. For other versioning options check https://aka.ms/obpipelines/versioning
            displayName: 'Setup BuildNumber'
            inputs:
              system: 'RevisionCounter'
              major: '1'
              minor: '0'
              tag: 'alpha'
              name: 'mssql-language-extensions'
              exclude_commit: false

          - task: CmdLine@2
            displayName: 'Restore Java Packages'
            inputs:
              script: $(Build.SourcesDirectory)\sql-server-language-extensions\language-extensions\java\build\windows\restore-packages.cmd
              workingDirectory: '$(Build.SourcesDirectory)'

          - task: CmdLine@2
            displayName: 'Restore R Packages'
            inputs:
              script: $(Build.SourcesDirectory)\sql-server-language-extensions\language-extensions\R\build\windows\restore-packages.cmd
              workingDirectory: '$(Build.SourcesDirectory)'

          # Authentication task for the pip client used for installing Python packages.
          - task: PipAuthenticate@1
            displayName: 'Authentication for pip client'
            inputs:
              artifactFeeds: 'Data-SQL-Language-Extensions'

          # Use the specified version of Python from the tool cache, optionally adding it to the PATH.
          - task: UsePythonVersion@0
            name: 'InstallPython'
            inputs:
              versionSpec: '3.10.2'
              addToPath: true
              architecture: 'x64'

          - task: CmdLine@2
            displayName: 'Restore Python Packages'
            inputs:
              script: $(Build.SourcesDirectory)\sql-server-language-extensions\language-extensions\python\build\windows\restore-packages.cmd $(InstallPython.pythonLocation)
              workingDirectory: '$(Build.SourcesDirectory)'

          - task: CmdLine@2
            displayName: 'Restore and Build GoogleTest'
            inputs:
              script: $(Build.SourcesDirectory)\sql-server-language-extensions\test\googletest\build\windows\build-googletest.cmd
              workingDirectory: '$(Build.SourcesDirectory)'

          - task: CmdLine@2
            displayName: 'Build Java extension'
            inputs:
              script: $(Build.SourcesDirectory)\sql-server-language-extensions\language-extensions\java\build\windows\build-java-extension.cmd debug release
              workingDirectory: '$(Build.SourcesDirectory)'

          - task: onebranch.pipeline.signing@1
            displayName: 'Sign java extension'
            inputs:
              command: 'sign'
              signing_environment: 'azure-ado'
              signing_profile: ''
              cp_code: '170'
              files_to_sign: 'mssql-java-lang-extension.jar' 
              search_root: '$(Build.SourcesDirectory)\sql-server-language-extensions\build-output\java-extension\target\debug'

          - task: CopyFiles@2
            displayName: 'Copy javaextension SDK(debug)'
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)\sql-server-language-extensions\build-output\java-extension\target\debug'
              Contents: 'mssql-java-lang-extension.jar'
              TargetFolder: '$(Build.SourcesDirectory)\out\build\out\java-extension\debug'

          - task: onebranch.pipeline.signing@1
            displayName: 'Sign java extension'
            inputs:
              command: 'sign'
              signing_environment: 'azure-ado'
              signing_profile: ''
              cp_code: '135020002'
              files_to_sign: 'javaextension.dll' 
              search_root: '$(Build.SourcesDirectory)\sql-server-language-extensions\build-output\java-extension\windows\debug'

          - task: onebranch.pipeline.signing@1
            displayName: 'Sign java extension'
            inputs:
              command: 'sign'
              signing_environment: 'azure-ado'
              signing_profile: ''
              cp_code: '170'
              files_to_sign: 'mssql-java-lang-extension.jar' 
              search_root: '$(Build.SourcesDirectory)\sql-server-language-extensions\build-output\java-extension\target\release'

          - task: CopyFiles@2
            displayName: 'Copy javaextension SDK(release)'
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)\sql-server-language-extensions\build-output\java-extension\target\release'
              Contents: 'mssql-java-lang-extension.jar'
              TargetFolder: '$(Build.SourcesDirectory)\out\build\out\java-extension\release'

          - task: onebranch.pipeline.signing@1
            displayName: 'Sign java extension'
            inputs:
              command: 'sign'
              signing_environment: 'azure-ado'
              signing_profile: ''
              cp_code: '135020002'
              files_to_sign: 'javaextension.dll' 
              search_root: '$(Build.SourcesDirectory)\sql-server-language-extensions\build-output\java-extension\windows\release'

          - task: CopyFiles@2
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)\sql-server-language-extensions\build-output\java-extension\windows\release'
              Contents: 'javaextension.pdb'
              TargetFolder: '$(Build.SourcesDirectory)\out\build\out\java-extension\release\symbols'

          - task: CmdLine@2
            displayName: 'Build RExtension'
            inputs:
              script: $(Build.SourcesDirectory)\sql-server-language-extensions\language-extensions\R\build\windows\build-RExtension.cmd debug release
              workingDirectory: '$(Build.SourcesDirectory)'
          
          - task: onebranch.pipeline.signing@1
            displayName: 'Sign RExtension'
            inputs:
              command: 'sign'
              signing_environment: 'azure-ado'
              signing_profile: ''
              cp_code: '135020002'
              files_to_sign: 'libRExtension.dll' 
              search_root: '$(Build.SourcesDirectory)\sql-server-language-extensions\build-output\RExtension\windows\debug'

          - task: onebranch.pipeline.signing@1
            displayName: 'Sign RExtension'
            inputs:
              command: 'sign'
              signing_environment: 'azure-ado'
              signing_profile: ''
              cp_code: '135020002'
              files_to_sign: 'libRExtension.dll' 
              search_root: '$(Build.SourcesDirectory)\sql-server-language-extensions\build-output\RExtension\windows\release'

          - task: CopyFiles@2
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)\sql-server-language-extensions\build-output\RExtension\windows\release'
              Contents: 'libRExtension.pdb'
              TargetFolder: '$(Build.SourcesDirectory)\out\build\out\RExtension\release\symbols'

          - task: CmdLine@2
            displayName: 'Build python extension'
            inputs:
              script: $(Build.SourcesDirectory)\sql-server-language-extensions\language-extensions\python\build\windows\build-python-extension.cmd debug release
              workingDirectory: '$(Build.SourcesDirectory)'

          - task: onebranch.pipeline.signing@1
            displayName: 'Sign python extension'
            inputs:
              command: 'sign'
              signing_environment: 'azure-ado'
              signing_profile: ''
              cp_code: '135020002'
              files_to_sign: 'pythonextension.dll' 
              search_root: '$(Build.SourcesDirectory)\sql-server-language-extensions\build-output\pythonextension\windows\debug'

          - task: onebranch.pipeline.signing@1
            displayName: 'Sign python extension'
            inputs:
              command: 'sign'
              signing_environment: 'azure-ado'
              signing_profile: ''
              cp_code: '135020002'
              files_to_sign: 'pythonextension.dll' 
              search_root: '$(Build.SourcesDirectory)\sql-server-language-extensions\build-output\pythonextension\windows\release'

          - task: CopyFiles@2
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)\sql-server-language-extensions\build-output\pythonextension\windows\release'
              Contents: 'pythonextension.pdb'
              TargetFolder: '$(Build.SourcesDirectory)\out\build\out\pythonextension\release\symbols'

          - task: CmdLine@2
            displayName: 'Build RExtension Test'
            inputs:
              script: $(Build.SourcesDirectory)\sql-server-language-extensions\language-extensions\R\test\build\windows\build-RExtension-test.cmd debug release
              workingDirectory: '$(Build.SourcesDirectory)'

          - task: CmdLine@2
            displayName: 'Build pythonextension Test'
            inputs:
              script: $(Build.SourcesDirectory)\sql-server-language-extensions\language-extensions\python\test\build\windows\build-pythonextension-test.cmd debug release
              workingDirectory: '$(Build.SourcesDirectory)'

          - task: CopyFiles@2
            displayName: 'Copy nuspec'
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)'
              Contents: 'data-sql-language-extensions-windows.nuspec'
              TargetFolder: '$(Build.SourcesDirectory)\out'

          - task: CmdLine@2
            displayName: 'Create Java extension zip'
            inputs:
              script: $(Build.SourcesDirectory)\sql-server-language-extensions\language-extensions\java\build\windows\create-java-extension-zip.cmd debug release
              workingDirectory: '$(Build.SourcesDirectory)'

          - task: onebranch.pipeline.signing@1
            displayName: 'Sign java extension'
            inputs:
              command: 'sign'
              signing_environment: 'azure-ado'
              signing_profile: 'internal_azure_service'
              # cp_code: '135020002'
              files_to_sign: '**\debug\java-lang-extension.zip;**\release\java-lang-extension.zip' 
              search_root: '$(Build.SourcesDirectory)\sql-server-language-extensions\build-output\java-extension\windows'

          - task: CopyFiles@2
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)\sql-server-language-extensions\build-output\java-extension\windows\debug\packages'
              Contents: '**\*.zip'
              # Contents: 'java-lang-extension.zip'
              TargetFolder: '$(Build.SourcesDirectory)\out\package\out\java-extension\packages\debug'

          - task: CopyFiles@2
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)\sql-server-language-extensions\build-output\java-extension\windows\release\packages'
              Contents: '**\*.zip'
              # Contents: 'java-lang-extension.zip'
              TargetFolder: '$(Build.SourcesDirectory)\out\package\out\java-extension\packages\release'

          - task: CmdLine@2
            displayName: 'Create RExtension zip'
            inputs:
              script: $(Build.SourcesDirectory)\sql-server-language-extensions\language-extensions\R\build\windows\create-RExtension-zip.cmd debug release
              workingDirectory: '$(Build.SourcesDirectory)'

          - task: onebranch.pipeline.signing@1
            displayName: 'Sign RExtension'
            inputs:
              command: 'sign'
              signing_environment: 'azure-ado'
              signing_profile: 'internal_azure_service'
              # cp_code: '135020002'
              files_to_sign: '**\debug\packages\R-lang-extension.zip;**\release\packages\R-lang-extension.zip' 
              search_root: '$(Build.SourcesDirectory)\sql-server-language-extensions\build-output\RExtension\windows'

          - task: CopyFiles@2
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)\sql-server-language-extensions\build-output\RExtension\windows\debug\packages'
              Contents: '**\*.zip'
              # Contents: 'R-lang-extension.zip'
              TargetFolder: '$(Build.SourcesDirectory)\out\package\out\RExtension\packages\debug'

          - task: CopyFiles@2
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)\sql-server-language-extensions\build-output\RExtension\windows\release\packages'
              Contents: '**\*.zip'
              # Contents: 'R-lang-extension.zip'
              TargetFolder: '$(Build.SourcesDirectory)\out\package\out\RExtension\packages\release'

          - task: CmdLine@2
            displayName: 'Create python extension zip'
            inputs:
              script: $(Build.SourcesDirectory)\sql-server-language-extensions\language-extensions\python\build\windows\create-python-extension-zip.cmd debug release
              workingDirectory: '$(Build.SourcesDirectory)'

          - task: onebranch.pipeline.signing@1
            displayName: 'Sign python extension'
            inputs:
              command: 'sign'
              signing_environment: 'azure-ado'
              signing_profile: 'internal_azure_service'
              # cp_code: '135020002'
              files_to_sign: '**\debug\packages\python-lang-extension.zip;**\release\packages\python-lang-extension.zip' 
              search_root: '$(Build.SourcesDirectory)\sql-server-language-extensions\build-output\pythonextension\windows'

          - task: CopyFiles@2
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)\sql-server-language-extensions\build-output\pythonextension\windows\debug\packages'
              Contents: '**\*.zip'
              # Contents: 'python-lang-extension.zip'
              TargetFolder: '$(Build.SourcesDirectory)\out\package\out\pythonextension\packages\debug'

          - task: CopyFiles@2
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)\sql-server-language-extensions\build-output\pythonextension\windows\release\packages'
              Contents: '**\*.zip'
              # Contents: 'python-lang-extension.zip'
              TargetFolder: '$(Build.SourcesDirectory)\out\package\out\pythonextension\packages\release'

          - task: CmdLine@2 
            displayName: 'Generate file list'
            inputs:
              targetType: 'inline'
              script: |
                dir $(Build.SourcesDirectory) /b /s > $(Build.SourcesDirectory)\out\filelist.txt

          - task: CmdLine@2
            displayName: 'All Tests'
            inputs:
              script: $(Build.SourcesDirectory)\sql-server-language-extensions\language-extensions\R\test\build\windows\run-RExtension-test.cmd debug release
              workingDirectory: '$(Build.SourcesDirectory)'
              failOnStderr: false

          - task: PublishTestResults@2
            displayName: 'Test RExtension'
            inputs:
              testResultsFormat: 'VSTest'
              testResultsFiles: '**\*.trx'
              searchFolder: '$(Build.SourcesDirectory)\sql-server-language-extensions\language-extensions\R\test\build\windows'
              failTaskOnFailedTests: true
              testRunTitle: 'Test RExtension'
              # buildPlatform: 'x64'
              # buildConfiguration: 'Release'

          - task: PublishCodeCoverageResults@2
            displayName: 'Test RExtension'
            inputs:
              codeCoverageTool: 'Cobertura'
              summaryFileLocation: '$(Build.SourcesDirectory)\TestOutput\reports\coverage.cobertura.xml'
              pathToSources: '$(Build.SourcesDirectory)'
              reportDirectory: 'TestOutput\reports'
              additionalCodeCoverageFiles: '$(Build.SourcesDirectory)\TestOutput\reports\**\*.xml;$(Build.SourcesDirectory)\TestOutput\reports\index.html;!**\*reports*.xml'

          - task: CopyFiles@2
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)\out'
              Contents: 'TestReport_RExtension-test.xml'
              TargetFolder: '$(Build.SourcesDirectory)\out\test\_post_command__test_rextension\_testresults\out'

          - task: CmdLine@2
            displayName: 'Python Tests'
            inputs:
              script: $(Build.SourcesDirectory)\sql-server-language-extensions\language-extensions\python\test\build\windows\run-pythonextension-test.cmd debug release
              workingDirectory: '$(Build.SourcesDirectory)'
              failOnStderr: false

          - task: PublishTestResults@2
            displayName: 'Python Tests'
            inputs:
              testResultsFormat: 'VSTest'
              testResultsFiles: '**\*.trx'
              searchFolder: '$(Build.SourcesDirectory)\sql-server-language-extensions\language-extensions\python\test\build\windows'
              failTaskOnFailedTests: true
              testRunTitle: 'Python Tests'
              # buildPlatform: 'x64'
              # buildConfiguration: 'Release'

          - task: PublishCodeCoverageResults@2
            displayName: 'Python Tests'
            inputs:
              codeCoverageTool: 'Cobertura'
              summaryFileLocation: '$(Build.SourcesDirectory)\TestOutput\reports\coverage.cobertura.xml'
              pathToSources: '$(Build.SourcesDirectory)'
              reportDirectory: 'TestOutput\reports'
              additionalCodeCoverageFiles: '$(Build.SourcesDirectory)\TestOutput\reports\**\*.xml;$(Build.SourcesDirectory)\TestOutput\reports\index.html;!**\*reports*.xml'

          - task: CopyFiles@2
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)\out'
              Contents: 'TestReport_PythonExtension-test.xml'
              TargetFolder: '$(Build.SourcesDirectory)\out\test\_post_command__test_python\_testresults\out'


    - stage: Build_DotNetCore_CSharp_Extension

      jobs:
      - job: CSharp_Extension
        pool:
          type: windows  # read more about custom job pool types at https://aka.ms/obpipelines/yaml/jobs

        variables: # More settings at https://aka.ms/obpipelines/yaml/jobs
          ob_outputDirectory: '$(Build.SourcesDirectory)\out' # this directory is uploaded to pipeline artifacts, reddog and cloudvault. More info at https://aka.ms/obpipelines/artifacts
          ob_artifactBaseName: 'drop_Build_DotNetCore_CSharp_Extension'
          WindowsContainerImage: 'onebranch.azurecr.io/windows/ltsc2019/vse2019:latest'
          # ob_sdl_codeSignValidation_excludes: regex|.+(?:dll|exe|sys|ps1|ps1xml|psc1|psd1|cdxml|vbs|js|wsf)$;-:file|**\ci-test\**\*.*
          # ob_sdl_baseline_baselineFile: $(Build.SourcesDirectory)\.gdn\global.gdnbaselines
          # ob_sdl_baseline_baselineSet: default
          CDP_USER_SOURCE_FOLDER_CONTAINER_PATH: '$(Build.SourcesDirectory)'

        steps:

          - task: UseDotNet@2
            displayName: 'Install .NET Core SDK'
            inputs:
              version: 8.x
              performMultiLevelLookup: true
              includePreviewVersions: true # Required for preview versions

          - task: onebranch.pipeline.version@1 # generates automatic version. For other versioning options check https://aka.ms/obpipelines/versioning
            displayName: 'Setup BuildNumber'
            inputs:
              system: 'RevisionCounter'
              major: '1'
              minor: '0'
              tag: 'alpha'
              name: 'mssql-language-extensions'
              exclude_commit: false

          - task: CmdLine@2
            displayName: 'Restore DotNetCore CSharp Packages'
            inputs:
              script: $(Build.SourcesDirectory)\sql-server-language-extensions\language-extensions\dotnet-core-CSharp\build\windows\restore-packages.cmd
              workingDirectory: '$(Build.SourcesDirectory)'

          - task: DotNetCoreCLI@2
            displayName: 'Restore CSharpExtension Project'
            inputs:
              command: 'restore'
              projects: '$(Build.SourcesDirectory)\sql-server-language-extensions\language-extensions\dotnet-core-CSharp\src\managed\Microsoft.SqlServer.CSharpExtension.csproj'
              feedsToUse: 'select' # This indicates that we will specify feeds to use and not a nuget.config file.
              vstsFeed: 'Data-SQL-Language-Extensions' # The feed to restore packages from.
              includeNuGetOrg: false # Do not include nuget.org as a package source as this is not allowed in onebranch.

          - task: CmdLine@2
            displayName: 'Build .NET Core C Sharp extension'
            inputs:
              script: $(Build.SourcesDirectory)\sql-server-language-extensions\language-extensions\dotnet-core-CSharp\build\windows\build-dotnet-core-CSharp-extension.cmd debug release
              workingDirectory: '$(Build.SourcesDirectory)'

          - task: onebranch.pipeline.signing@1
            displayName: 'Sign CSharp extension - debug'
            inputs:
              command: 'sign'
              signing_environment: 'azure-ado'
              signing_profile: 'external_distribution'
              # cp_code: '135020002'
              files_to_sign: '*.dll;Microsoft.SqlServer.CSharpExtension.runtimeconfig.json;Microsoft.SqlServer.CSharpExtension.deps.json' 
              search_root: '$(Build.SourcesDirectory)\sql-server-language-extensions\build-output\dotnet-core-CSharp-extension\windows\debug'

          - task: onebranch.pipeline.signing@1
            displayName: 'Sign CSharp extension - release'
            inputs:
              command: 'sign'
              signing_environment: 'azure-ado'
              signing_profile: 'external_distribution'
              # cp_code: '135020002'
              files_to_sign: '*.dll;Microsoft.SqlServer.CSharpExtension.runtimeconfig.json;Microsoft.SqlServer.CSharpExtension.deps.json' 
              search_root: '$(Build.SourcesDirectory)\sql-server-language-extensions\build-output\dotnet-core-CSharp-extension\windows\release'

          - task: CopyFiles@2
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)\sql-server-language-extensions\build-output\dotnet-core-CSharp-extension\windows\release'
              Contents: |
                *.pdb
              TargetFolder: '$(Build.SourcesDirectory)\out\build\out\dotnet-core-CSharp-extension\release\symbols'

          - task: CmdLine@2
            displayName: 'Build DotNetCore CSharp Extension Test'
            inputs:
              script: $(Build.SourcesDirectory)\sql-server-language-extensions\language-extensions\dotnet-core-CSharp\test\build\windows\build-dotnet-core-CSharp-extension-test.cmd debug release
              workingDirectory: '$(Build.SourcesDirectory)'

          - task: onebranch.pipeline.signing@1
            displayName: 'Sign CSharp extension'
            inputs:
              command: 'sign'
              signing_environment: 'azure-ado'
              signing_profile: 'external_distribution'
              # cp_code: '135020002'
              files_to_sign: '**\Microsoft.SqlServer.CSharpExtensionTest.dll' 
              search_root: '$(Build.SourcesDirectory)\sql-server-language-extensions\build-output\dotnet-core-CSharp-extension-test\windows'

          - task: CopyFiles@2
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)\sql-server-language-extensions\build-output\dotnet-core-CSharp-extension-test\windows\debug'
              Contents: |
                *.dll
              TargetFolder: '$(Build.SourcesDirectory)\out\build\out\dotnet-core-CSharp-extension\debug'

          - task: CopyFiles@2
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)\sql-server-language-extensions\build-output\dotnet-core-CSharp-extension-test\windows\debug'
              Contents: |
                *.pdb
              TargetFolder: '$(Build.SourcesDirectory)\out\build\out\dotnet-core-CSharp-extension\debug\symbols'

          - task: CopyFiles@2
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)\sql-server-language-extensions\build-output\dotnet-core-CSharp-extension-test\windows\release'
              Contents: |
                *.dll
              TargetFolder: '$(Build.SourcesDirectory)\out\build\out\dotnet-core-CSharp-extension\release'

          - task: CopyFiles@2
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)\sql-server-language-extensions\build-output\dotnet-core-CSharp-extension-test\windows\release'
              Contents: |
                *.pdb
              TargetFolder: '$(Build.SourcesDirectory)\out\build\out\dotnet-core-CSharp-extension\release\symbols'

          - task: CmdLine@2
            displayName: 'Create .NET Core C Sharp extension zip'
            inputs:
              script: $(Build.SourcesDirectory)\sql-server-language-extensions\language-extensions\dotnet-core-CSharp\build\windows\create-dotnet-core-CSharp-extension-zip.cmd debug release
              workingDirectory: '$(Build.SourcesDirectory)'

          - task: onebranch.pipeline.signing@1
            displayName: 'Sign RExtension'
            inputs:
              command: 'sign'
              signing_environment: 'azure-ado'
              signing_profile: 'external_distribution'
              # cp_code: '135020002'
              files_to_sign: '**\*.zip' 
              search_root: '$(Build.SourcesDirectory)\sql-server-language-extensions\build-output\dotnet-core-CSharp-extension\windows'

          - task: CopyFiles@2
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)\sql-server-language-extensions\build-output\dotnet-core-CSharp-extension\windows\debug\packages'
              Contents: '**\*.zip'
              TargetFolder: '$(Build.SourcesDirectory)\out\package\out\dotnet-core-CSharp-extension\packages\debug'

          - task: CopyFiles@2
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)\sql-server-language-extensions\build-output\dotnet-core-CSharp-extension\windows\release\packages'
              Contents: '**\*.zip'
              TargetFolder: '$(Build.SourcesDirectory)\out\package\out\dotnet-core-CSharp-extension\packages\release'

          - task: CmdLine@2
            displayName: 'Test DotNetCore CSharp Extension'
            inputs:
              script: $(Build.SourcesDirectory)\sql-server-language-extensions\language-extensions\dotnet-core-CSharp\test\build\windows\run-dotnet-core-CSharp-extension-test.cmd debug release
              workingDirectory: '$(Build.SourcesDirectory)'
              failOnStderr: false
            env:
              DOTNET_ROOT: $(Build.SourcesDirectory)\sql-server-language-extensions\build-output

          - task: PublishTestResults@2
            displayName: 'All Tests'
            inputs:
              testResultsFormat: 'VSTest'
              testResultsFiles: '**\*.trx'
              searchFolder: '$(Build.SourcesDirectory)\sql-server-language-extensions\language-extensions'
              failTaskOnFailedTests: true
              testRunTitle: 'Test DotNetCore CSharp Extension'
              # buildPlatform: 'x64'
              # buildConfiguration: 'Release'

          - task: CopyFiles@2
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)\out'
              Contents: 'TestReport_dotnet-core-csharp-extension-test.xml'
              TargetFolder: '$(Build.SourcesDirectory)\out\test\_post_command__test_dotnetcore_csharp_extension\_testresults\out'

    - stage: Build_ONNXRuntime_Extension

      jobs:
      - job: ONNXRuntime_Extension
        pool:
          type: windows  # read more about custom job pool types at https://aka.ms/obpipelines/yaml/jobs

        variables: # More settings at https://aka.ms/obpipelines/yaml/jobs
          ob_outputDirectory: '$(Build.SourcesDirectory)\out' # this directory is uploaded to pipeline artifacts, reddog and cloudvault. More info at https://aka.ms/obpipelines/artifacts
          ob_artifactBaseName: 'drop_Build_ONNXRuntime_Extension'
          WindowsContainerImage: 'onebranch.azurecr.io/windows/ltsc2019/vse2022:latest'
          CDP_USER_SOURCE_FOLDER_CONTAINER_PATH: '$(Build.SourcesDirectory)'

        steps:
          - task: onebranch.pipeline.version@1 # generates automatic version. For other versioning options check https://aka.ms/obpipelines/versioning
            displayName: 'Setup BuildNumber'
            inputs:
              system: 'RevisionCounter'
              major: '1'
              minor: '0'
              tag: 'alpha'
              name: 'onnxruntime-extension'
              exclude_commit: false

          - task: CmdLine@2
            displayName: 'Restore ONNX Runtime Packages'
            inputs:
              script: '$(Build.SourcesDirectory)\onnxruntime-extension\build\windows\restore-packages.cmd'
              workingDirectory: '$(Build.SourcesDirectory)'
              failOnStderr: true

          - task: CmdLine@2
            displayName: 'Build ONNXRuntime extension'
            inputs:
              script: '$(Build.SourcesDirectory)\onnxruntime-extension\build\windows\build-onnxruntime-extension.cmd debug release'
              workingDirectory: '$(Build.SourcesDirectory)'
              failOnStderr: true

          - task: onebranch.pipeline.signing@1
            displayName: 'Sign ONNXRuntime extension - debug'
            inputs:
              command: 'sign'
              signing_environment: 'azure-ado'
              signing_profile: 'external_distribution'
              files_to_sign: '*.dll;' 
              search_root: '$(Build.SourcesDirectory)\onnxruntime-extension\build\x64\bin\Debug'

          - task: onebranch.pipeline.signing@1
            displayName: 'Sign ONNXRuntime extension - release'
            inputs:
              command: 'sign'
              signing_environment: 'azure-ado'
              signing_profile: 'external_distribution'
              files_to_sign: '*.dll;' 
              search_root: '$(Build.SourcesDirectory)\onnxruntime-extension\build\x64\bin\Release'

          - task: CopyFiles@2
            displayName: 'Copy ONNXRuntime extension Symbols (debug)'
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)\onnxruntime-extension\build\x64\bin\Debug'
              Contents: |
                *.pdb
              TargetFolder: '$(Build.SourcesDirectory)\out\build\out\onnxruntime-extension\debug\symbols'

          - task: CopyFiles@2
            displayName: 'Copy ONNXRuntime extension (debug)'
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)\onnxruntime-extension\build\x64\bin\Debug'
              Contents: |
                *.dll
              TargetFolder: '$(Build.SourcesDirectory)\out\build\out\onnxruntime-extension\debug'

          - task: CopyFiles@2
            displayName: 'Copy ONNXRuntime extension Symbols (release)'
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)\onnxruntime-extension\build\x64\bin\Release'
              Contents: |
                *.pdb
              TargetFolder: '$(Build.SourcesDirectory)\out\build\out\onnxruntime-extension\release\symbols'

          - task: CopyFiles@2
            displayName: 'Copy ONNXRuntime extension (release)'
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)\onnxruntime-extension\build\x64\bin\Release'
              Contents: |
                *.dll
              TargetFolder: '$(Build.SourcesDirectory)\out\build\out\onnxruntime-extension\release'

          - task: CmdLine@2
            displayName: 'Create ONNXRuntime extension zip'
            inputs:
              script: '$(Build.SourcesDirectory)\onnxruntime-extension\build\windows\create-onnxruntime-extension-zip.cmd debug release'
              workingDirectory: '$(Build.SourcesDirectory)'
              failOnStderr: true

          - task: onebranch.pipeline.signing@1
            displayName: 'Sign ONNXRuntime extension zip'
            inputs:
              command: 'sign'
              signing_environment: 'azure-ado'
              signing_profile: 'external_distribution'
              # cp_code: '135020002'
              files_to_sign: '**\**\*.zip' 
              search_root: '$(Build.SourcesDirectory)\onnxruntime-extension\build\build-output\onnxextension\windows'

          - task: CopyFiles@2
            displayName: 'Copy ONNXRuntime extension zip(debug)'
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)\onnxruntime-extension\build\build-output\onnxextension\windows\debug\packages'
              Contents: '**\*.zip'
              TargetFolder: '$(Build.SourcesDirectory)\out\package\out\onnxruntime-extension\packages\debug'

          - task: CopyFiles@2
            displayName: 'Copy ONNXRuntime extension zip(release)'
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)\onnxruntime-extension\build\build-output\onnxextension\windows\release\packages'
              Contents: '**\*.zip'
              TargetFolder: '$(Build.SourcesDirectory)\out\package\out\onnxruntime-extension\packages\release'

    - stage: NuGet_Pack_Push_Windows
      displayName: 'NuGet Pack and Push (Windows)'
      dependsOn:
      - Phase_1
      - Build_DotNetCore_CSharp_Extension
      - Build_ONNXRuntime_Extension
      jobs:
      - job: NuGet_Windows
        displayName: 'NuGet Pack and Push (Windows)'
        pool:
          type: windows
        variables:
          ob_outputDirectory: '$(Build.SourcesDirectory)\out'
          ob_artifactBaseName: 'drop_NuGet_Windows'
        steps:
          - download: current
            artifact: drop_Phase_1

          - download: current
            artifact: drop_Build_DotNetCore_CSharp_Extension

          - download: current
            artifact: drop_Build_ONNXRuntime_Extension

          - task: NuGetToolInstaller@1
            displayName: 'Install NuGet'

          - task: CopyFiles@2
            displayName: 'Copy nuspec to workspace root'
            inputs:
              SourceFolder: '$(Pipeline.Workspace)\drop_Phase_1'
              Contents: 'data-sql-language-extensions-windows.nuspec'
              TargetFolder: '$(Pipeline.Workspace)'

          - task: CmdLine@2
            displayName: 'NuGet Pack'
            inputs:
              script: nuget pack "$(Pipeline.Workspace)\data-sql-language-extensions-windows.nuspec" -OutputDirectory "$(Build.SourcesDirectory)\out" -Version $(Build.BuildNumber) -NoDefaultExcludes
              workingDirectory: '$(Pipeline.Workspace)'

          - task: NuGetAuthenticate@1
            displayName: 'NuGet Authenticate'

          - task: NuGetCommand@2
            displayName: 'NuGet Push'
            inputs:
              command: 'push'
              packagesToPush: '$(Build.SourcesDirectory)\out\*.nupkg'
              nuGetFeedType: 'internal'
              publishVstsFeed: 'Data-SQL-Language-Extensions'
