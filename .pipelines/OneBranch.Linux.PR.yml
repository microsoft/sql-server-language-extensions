#################################################################################
#   Onebranch Pipelines - PR Linux                                              #
# This pipeline was created by EasyStart from a sample located at:              #
#   https://aka.ms/obpipelines/easystart/samples                                #
# Documentation:  https://aka.ms/obpipelines                                    #
# Yaml Schema:    https://aka.ms/obpipelines/yaml/schema                        #
# Retail Tasks:   https://aka.ms/obpipelines/tasks                              #
# Support:        https://aka.ms/onebranchsup                                   #
#################################################################################

trigger: none

parameters: # parameters are shown up in ADO UI in a build queue time
- name: 'debug'
  displayName: 'Enable debug output'
  type: boolean
  default: false

variables:
  CDP_DEFINITION_BUILD_COUNT: $[counter('', 0)] # needed for onebranch.pipeline.version task https://aka.ms/obpipelines/versioning
  LinuxContainerImage: 'onebranch.azurecr.io/linux/ubuntu-2404:latest' # Docker image which is used to build the project https://aka.ms/obpipelines/containers
  WindowsContainerImage: 'onebranch.azurecr.io/windows/ltsc2019/vse2019:latest' # Needed for NuGet Pack/Push stage which runs on Windows
  DEBIAN_FRONTEND: noninteractive
  ROOT: $(Build.SourcesDirectory)
  REPOROOT: $(Build.SourcesDirectory)
  OUTPUTROOT: $(REPOROOT)\out
  CDP_USER_SOURCE_FOLDER_CONTAINER_PATH: $(Build.SourcesDirectory)
  CDP_DEFINITION_BUILD_COUNT_DAY: $[counter(format('{0:yyyyMMdd}', pipeline.startTime), 1)]
  CDP_DEFINITION_BUILD_COUNT_MONTH: $[counter(format('{0:yyyyMM}', pipeline.startTime), 1)]
  CDP_DEFINITION_BUILD_COUNT_YEAR: $[counter(format('{0:yyyy}', pipeline.startTime), 1)]

resources:
  repositories: 
    - repository: templates
      type: git
      name: OneBranch.Pipelines/GovernedTemplates
      ref: refs/heads/main

extends:
  template: v2/OneBranch.NonOfficial.CrossPlat.yml@templates # https://aka.ms/obpipelines/templates
  parameters:
    globalSdl: # https://aka.ms/obpipelines/sdl
      tsa:
       enabled: false # SDL results of non-official builds aren't uploaded to TSA by default.
      # credscan:
      #   suppressionsFile: $(Build.SourcesDirectory)\.config\CredScanSuppressions.json
      policheck:
        break: false # always break the build on policheck issues. You can disable it by setting to 'false'
      # baseline:
      #   baselineFile: $(Build.SourcesDirectory)\.gdn\global.gdnbaselines

    stages:
    - stage: linux_stage
      jobs:
      - job: linux_job
        pool:
          type: linux

        variables: # More settings at https://aka.ms/obpipelines/yaml/jobs
          ob_outputDirectory: '$(Build.SourcesDirectory)/out' # this directory is uploaded to pipeline artifacts, reddog and cloudvault. More info at https://aka.ms/obpipelines/artifacts
          ob_artifactBaseName: 'drop'
          
        steps:
          - task: onebranch.pipeline.version@1
            displayName: 'Setup BuildNumber'
            inputs:
              system: 'RevisionCounter'
              major: '1'
              minor: '0'
              tag: 'alpha'
              name: 'mssql-language-extensions'
              exclude_commit: false

          - task: CmdLine@2
            displayName: 'Grant Permissions'
            inputs:
              script: chmod +x $(Build.SourcesDirectory)/sql-server-language-extensions -R
              workingDirectory: '$(Build.SourcesDirectory)'

          - task: CmdLine@2
            displayName: 'Restore Packages'
            inputs:
              script: $(Build.SourcesDirectory)/sql-server-language-extensions/restore-packages.sh
              workingDirectory: '$(Build.SourcesDirectory)'

          - task: CmdLine@2
            displayName: 'Restore Java Packages'
            inputs:
              script: $(Build.SourcesDirectory)/sql-server-language-extensions/language-extensions/java/build/linux/restore-packages.sh
              workingDirectory: '$(Build.SourcesDirectory)'

          - task: CmdLine@2
            displayName: 'Restore R Packages'
            inputs:
              script: $(Build.SourcesDirectory)/sql-server-language-extensions/language-extensions/R/build/linux/restore-packages.sh
              workingDirectory: '$(Build.SourcesDirectory)'

          # Authentication task for the pip client used for installing Python packages.
          - task: PipAuthenticate@1
            displayName: 'Authentication for pip client'
            inputs:
              artifactFeeds: 'Data-SQL-Language-Extensions'

          - task: CmdLine@2
            displayName: 'Restore Python Packages'
            inputs:
              script: $(Build.SourcesDirectory)/sql-server-language-extensions/language-extensions/python/build/linux/restore-packages.sh
              workingDirectory: '$(Build.SourcesDirectory)'

          - task: CmdLine@2
            displayName: 'Restore and Build GoogleTest'
            inputs:
              script: $(Build.SourcesDirectory)/sql-server-language-extensions/test/googletest/build/linux/build-googletest.sh
              workingDirectory: '$(Build.SourcesDirectory)'

          - task: CmdLine@2
            displayName: 'Build Java extension'
            inputs:
              script: $(Build.SourcesDirectory)/sql-server-language-extensions/language-extensions/java/build/linux/build-java-extension.sh debug release
              workingDirectory: '$(Build.SourcesDirectory)'

          - task: CopyFiles@2
            displayName: 'Copy javaextension SDK(debug)'
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)/sql-server-language-extensions/build-output/java-extension/target/debug'
              Contents: 'mssql-java-lang-extension-linux.jar'
              TargetFolder: '$(Build.SourcesDirectory)/out/build/out/java-extension/debug'

          - task: CopyFiles@2
            displayName: 'Copy javaextension SDK(release)'
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)/sql-server-language-extensions/build-output/java-extension/target/release'
              Contents: 'mssql-java-lang-extension-linux.jar'
              TargetFolder: '$(Build.SourcesDirectory)/out/build/out/java-extension/release'

          - task: CmdLine@2
            displayName: 'Build RExtension'
            inputs:
              script: $(Build.SourcesDirectory)/sql-server-language-extensions/language-extensions/R/build/linux/build-RExtension.sh debug release
              workingDirectory: '$(Build.SourcesDirectory)'

          - task: CmdLine@2
            displayName: 'Build Python Extension'
            inputs:
              script: $(Build.SourcesDirectory)/sql-server-language-extensions/language-extensions/python/build/linux/build-python-extension.sh debug release
              workingDirectory: '$(Build.SourcesDirectory)'

          - task: CmdLine@2
            displayName: 'Build RExtension test'
            inputs:
              script: $(Build.SourcesDirectory)/sql-server-language-extensions/language-extensions/R/test/build/linux/build-RExtension-test.sh debug release 
              workingDirectory: '$(Build.SourcesDirectory)'

          - task: CmdLine@2
            displayName: 'Build Python Extension test'
            inputs:
              script: $(Build.SourcesDirectory)/sql-server-language-extensions/language-extensions/python/test/build/linux/build-pythonextension-test.sh debug release 
              workingDirectory: '$(Build.SourcesDirectory)'

          - task: CopyFiles@2
            displayName: 'Copy nuspec'
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)'
              Contents: |
                data-sql-language-extensions-linux.nuspec
              TargetFolder: '$(Build.SourcesDirectory)/out'

          - task: CmdLine@2
            displayName: 'Create Java extension zip'
            inputs:
              script: $(Build.SourcesDirectory)/sql-server-language-extensions/language-extensions/java/build/linux/create-java-extension-zip.sh debug release
              workingDirectory: '$(Build.SourcesDirectory)'

          - task: CopyFiles@2
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)/sql-server-language-extensions/build-output/java-extension/linux/debug/packages'
              Contents: 'java-lang-extension-linux.zip'
              TargetFolder: '$(Build.SourcesDirectory)/out/package/out/java-extension/packages/debug'

          - task: CopyFiles@2
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)/sql-server-language-extensions/build-output/java-extension/linux/release/packages'
              Contents: 'java-lang-extension-linux.zip'
              TargetFolder: '$(Build.SourcesDirectory)/out/package/out/java-extension/packages/release'

          - task: CmdLine@2
            displayName: 'Create RExtension zip'
            inputs:
              script: $(Build.SourcesDirectory)/sql-server-language-extensions/language-extensions/R/build/linux/create-RExtension-zip.sh debug release
              workingDirectory: '$(Build.SourcesDirectory)'

          - task: CopyFiles@2
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)/sql-server-language-extensions/build-output/RExtension/linux/debug/packages'
              Contents: 'R-lang-extension-linux.zip'
              TargetFolder: '$(Build.SourcesDirectory)/out/package/out/RExtension/packages/debug'

          - task: CopyFiles@2
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)/sql-server-language-extensions/build-output/RExtension/linux/release/packages'
              Contents: 'R-lang-extension-linux.zip'
              TargetFolder: '$(Build.SourcesDirectory)/out/package/out/RExtension/packages/release'

          - task: CmdLine@2
            displayName: 'Create Python Extension zip'
            inputs:
              script: $(Build.SourcesDirectory)/sql-server-language-extensions/language-extensions/python/build/linux/create-python-extension-zip.sh debug release
              workingDirectory: '$(Build.SourcesDirectory)'

          - task: CopyFiles@2
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)/sql-server-language-extensions/build-output/pythonextension/linux/debug/packages'
              Contents: 'python-lang-extension-linux.zip'
              TargetFolder: '$(Build.SourcesDirectory)/out/package/out/pythonextension/packages/debug'

          - task: CopyFiles@2
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)/sql-server-language-extensions/build-output/pythonextension/linux/release/packages'
              Contents: 'python-lang-extension-linux.zip'
              TargetFolder: '$(Build.SourcesDirectory)/out/package/out/pythonextension/packages/release'

          - task: CmdLine@2
            displayName: 'Test RExtension-test'
            inputs:
              script: $(Build.SourcesDirectory)/sql-server-language-extensions/language-extensions/R/test/build/linux/run-RExtension-test.sh debug release
              workingDirectory: '$(Build.SourcesDirectory)'
              failOnStderr: false

          - task: PublishTestResults@2
            displayName: 'All Tests'
            inputs:
              testResultsFormat: 'VSTest'
              testResultsFiles: '**/*.trx'
              searchFolder: '$(Build.SourcesDirectory)/sql-server-language-extensions/language-extensions/R/test/build/linux'
              failTaskOnFailedTests: true
              testRunTitle: 'Test RExtension'
              # buildPlatform: 'x64'
              # buildConfiguration: 'Release'

          - task: PublishCodeCoverageResults@2
            displayName: 'All Tests'
            inputs:
              codeCoverageTool: 'Cobertura'
              summaryFileLocation: '$(Build.SourcesDirectory)/TestOutput/reports/coverage.cobertura.xml'
              pathToSources: '$(Build.SourcesDirectory)'
              reportDirectory: 'TestOutput/reports'
              additionalCodeCoverageFiles: '$(Build.SourcesDirectory)/TestOutput/reports/**/*.xml;$(Build.SourcesDirectory)/TestOutput/reports/index.html;!**/*reports*.xml'

          - task: CopyFiles@2
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)/out'
              Contents: 'TestReport*.xml'
              TargetFolder: '$(Build.SourcesDirectory)/out/test/_post_command__test_rextension/_testresults/out'

          - task: CmdLine@2
            displayName: 'Test PythonExtension-test'
            inputs:
              script:  chmod +x $(Build.SourcesDirectory)/empty-script.sh
              workingDirectory: '$(Build.SourcesDirectory)'
              failOnStderr: false

          - task: PublishTestResults@2
            displayName: 'All Tests'
            inputs:
              testResultsFormat: 'VSTest'
              testResultsFiles: '**/*.trx'
              searchFolder: '$(Build.SourcesDirectory)/sql-server-language-extensions/language-extensions/python/test/build/linux'
              failTaskOnFailedTests: true
              testRunTitle: 'Python Tests'
              # buildPlatform: 'x64'
              # buildConfiguration: 'Release'

          - task: PublishCodeCoverageResults@2
            displayName: 'All Tests'
            inputs:
              codeCoverageTool: 'Cobertura'
              summaryFileLocation: '$(Build.SourcesDirectory)/TestOutput/reports/coverage.cobertura.xml'
              pathToSources: '$(Build.SourcesDirectory)'
              reportDirectory: 'TestOutput/reports'
              additionalCodeCoverageFiles: '$(Build.SourcesDirectory)/TestOutput/reports/**/*.xml;$(Build.SourcesDirectory)/TestOutput/reports/index.html;!**/*reports*.xml'

          - task: CopyFiles@2
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)/out'
              Contents: 'TestReport*.xml'
              TargetFolder: '$(Build.SourcesDirectory)/out/test/_post_command__test_python/_testresults/out'

    - stage: Build_OnnxRuntime_Extension_Linux
      displayName: 'Build ONNX Runtime Extension (Linux)'
      jobs:
      - job: build_onnxruntime_extension
        displayName: 'Build and Package ONNX Runtime Extension (Linux)'
        pool:
          type: linux
        variables:
          ob_outputDirectory: '$(Build.SourcesDirectory)/out'
          ob_artifactBaseName: 'drop_Build_OnnxRuntime_Extension_Linux'

        steps:
          - script: |
              apt-get update
              apt-get install -y wget
              wget https://github.com/Kitware/CMake/releases/download/v3.25.3/cmake-3.25.3-linux-x86_64.sh
              mkdir -p /opt/cmake
              sh cmake-3.25.3-linux-x86_64.sh --skip-license --prefix=/opt/cmake
              echo "##vso[task.prependpath]/opt/cmake/bin"
            displayName: 'Install CMake 3.25.3'

          - task: CmdLine@2
            displayName: 'Make restore-packages.sh executable'
            inputs:
              script: chmod +x $(Build.SourcesDirectory)/onnxruntime-extension/build/linux/restore-packages.sh
              workingDirectory: '$(Build.SourcesDirectory)'

          - task: CmdLine@2
            displayName: 'Restore NuGet Packages for ONNX Runtime Extension'
            inputs:
              script: $(Build.SourcesDirectory)/onnxruntime-extension/build/linux/restore-packages.sh
              workingDirectory: '$(Build.SourcesDirectory)/onnxruntime-extension'
            env:
              DEBIAN_FRONTEND: noninteractive

          - task: CmdLine@2
            displayName: 'Make build-onnxruntime-extension.sh executable'
            inputs:
              script: chmod +x $(Build.SourcesDirectory)/onnxruntime-extension/build/linux/build-onnxruntime-extension.sh
              workingDirectory: '$(Build.SourcesDirectory)/onnxruntime-extension'
              failOnStderr: true

          - task: CmdLine@2
            displayName: 'Build ONNX Runtime Extension (Debug & Release)'
            inputs:
              script: $(Build.SourcesDirectory)/onnxruntime-extension/build/linux/build-onnxruntime-extension.sh release debug
              workingDirectory: '$(Build.SourcesDirectory)/onnxruntime-extension'
              failOnStderr: true

          - task: CopyFiles@2
            displayName: 'Copy OnnxRuntime Extension Library (Release)'
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)/onnxruntime-extension/build/x64/bin/Release'
              Contents: 'libonnxextension.so'
              TargetFolder: '$(ob_outputDirectory)/build/out/onnxruntime-extension/release'

          - task: CopyFiles@2
            displayName: 'Copy OnnxRuntime Extension Library (Debug)'
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)/onnxruntime-extension/build/x64/bin/Debug'
              Contents: 'libonnxextension.so'
              TargetFolder: '$(ob_outputDirectory)/build/out/onnxruntime-extension/debug'

          - task: CmdLine@2
            displayName: 'Make create-onnx-extension-zip.sh executable'
            inputs:
              script: chmod +x $(Build.SourcesDirectory)/onnxruntime-extension/build/linux/create-onnx-extension-zip.sh
              workingDirectory: '$(Build.SourcesDirectory)/onnxruntime-extension'

          - task: CmdLine@2
            displayName: 'Package ONNX Runtime Extension (Debug & Release)'
            inputs:
              script: $(Build.SourcesDirectory)/onnxruntime-extension/build/linux/create-onnx-extension-zip.sh debug release
              workingDirectory: '$(Build.SourcesDirectory)/onnxruntime-extension'

          - task: CopyFiles@2
            displayName: 'Copy OnnxRuntime Extension Zip (Debug)'
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)/onnxruntime-extension/build/build-output/onnxextension/linux/debug/packages'
              Contents: 'onnxruntime-extension-linux.zip'
              TargetFolder: '$(ob_outputDirectory)/package/out/onnxruntime-extension/packages/debug'

          - task: CopyFiles@2
            displayName: 'Copy OnnxRuntime Extension Zip (Release)'
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)/onnxruntime-extension/build/build-output/onnxextension/linux/release/packages'
              Contents: 'onnxruntime-extension-linux.zip'
              TargetFolder: '$(ob_outputDirectory)/package/out/onnxruntime-extension/packages/release'

    - stage: NuGet_Pack_Push_Linux
      displayName: 'NuGet Pack and Push (Linux)'
      dependsOn:
      - linux_stage
      - Build_OnnxRuntime_Extension_Linux
      jobs:
      - job: NuGet_Linux
        displayName: 'NuGet Pack and Push (Linux)'
        pool:
          type: windows
        variables:
          ob_outputDirectory: '$(Build.SourcesDirectory)\out'
          ob_artifactBaseName: 'drop_NuGet_Linux'
        steps:
          - download: current
            artifact: drop

          - download: current
            artifact: drop_Build_OnnxRuntime_Extension_Linux

          - task: NuGetToolInstaller@1
            displayName: 'Install NuGet'

          - task: CopyFiles@2
            displayName: 'Copy nuspec to workspace root'
            inputs:
              SourceFolder: '$(Pipeline.Workspace)\drop'
              Contents: 'data-sql-language-extensions-linux.nuspec'
              TargetFolder: '$(Pipeline.Workspace)'

          - task: PowerShell@2
            displayName: 'NuGet Pack'
            inputs:
              targetType: 'inline'
              script: |
                $date = Get-Date -Format 'yyyyMMdd'
                $version = "1.0.0-PR-$(Build.SourceBranchName)-${date}.$(CDP_DEFINITION_BUILD_COUNT_DAY)"
                Write-Host "Packing with version $version"
                & nuget pack "$(Pipeline.Workspace)\data-sql-language-extensions-linux.nuspec" -OutputDirectory "$(Build.SourcesDirectory)\out" -Version $version -NoDefaultExcludes
              workingDirectory: '$(Pipeline.Workspace)'

          - task: NuGetAuthenticate@1
            displayName: 'NuGet Authenticate'

          - task: NuGetCommand@2
            displayName: 'NuGet Push'
            inputs:
              command: 'push'
              packagesToPush: '$(Build.SourcesDirectory)\out\*.nupkg'
              nuGetFeedType: 'internal'
              publishVstsFeed: 'Data-SQL-Language-Extensions'

